spring:
  application:
    name: discodeit
  boot:
    admin:
      client:
        url: http://localhost:9090
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/discodeit}
    username: ${DB_USERNAME:discodeit_user}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    com.sprint.mission.discodeit: DEBUG
